name: reflectra
description: "A Project to Keep Track of Your Thoughts and Ideas"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  appflowy_editor: ^6.2.0
  convex_bottom_bar: ^3.2.0
  dio: ^5.9.2
  flex_color_scheme: ^8.4.0
  flutter:
    sdk: flutter
  flutter_form_builder: ^10.3.0+2
  flutter_gen_ai_chat_ui: ^2.11.0
  flutter_hooks: ^0.21.3+1
  flutter_secure_storage: ^10.0.0
  go_router: ^17.2.2
  go_router_builder: ^4.3.0
  hooks_riverpod: ^3.3.1
  isar_plus: ^1.2.5
  isar_plus_flutter_libs: ^1.2.5
  logger: ^2.7.0
  ollama_dart: ^2.1.0
  path_provider: ^2.1.5
  pattern_box: ^0.5.4
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.5
  toastification: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.13.1
  rename: ^3.1.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    # - assets/images/splash.png


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#ffffff"   # for Android adaptive icons
  adaptive_icon_foreground: "assets/images/logo.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/splash.png

  color_dark: "#000000"
  image_dark: assets/images/splash.png

  android: true
  ios: true

  android_12:
    image: assets/images/splash.png
    color: "#ffffff"